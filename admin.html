<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام نتائج مدارس نيو فيجن الخاصة - لوحة الإدارة</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; }
        
        .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 20px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; flex-wrap: wrap; gap: 15px; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ff8c00; background: white; padding: 3px; object-fit: contain; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.3s, box-shadow 0.3s; }
        .logo-img:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .logo-text { font-size: 22px; font-weight: bold; background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .subtitle { font-size: 11px; color: #718096; margin-top: 2px; }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .nav-links button, .student-link, .logout-header-btn { background: none; border: none; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 10px; transition: all 0.3s; color: #4a5568; text-decoration: none; display: inline-block; }
        .nav-links button:hover, .student-link:hover, .logout-header-btn:hover { background: #ff8c00; color: white; transform: translateY(-2px); }
        .nav-links button.active { background: linear-gradient(135deg, #ff8c00, #ffd700); color: white; }
        .student-link { background: #27ae60; color: white; }
        .student-link:hover { background: #219a52; }
        .logout-header-btn { background: #e74c3c; color: white; }
        .logout-header-btn:hover { background: #c0392b; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 25px; transition: transform 0.3s, box-shadow 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .card-header { background: linear-gradient(135deg, #2c3e50, #1a2a3a); color: white; padding: 18px 24px; font-size: 18px; font-weight: bold; }
        .card-body { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #2d3748; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 15px; font-size: 14px; transition: all 0.3s; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff8c00; box-shadow: 0 0 0 3px rgba(255,140,0,0.1); }
        .btn { padding: 12px 24px; border: none; border-radius: 15px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-block; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #2c3e50, #1a2a3a); color: white; }
        .btn-primary:hover { transform: translateY(-2px); background: linear-gradient(135deg, #ff8c00, #ffd700); color: #2c3e50; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; transform: translateY(-2px); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-json { background: #8e44ad; color: white; }
        .btn-json:hover { background: #6c3483; transform: translateY(-2px); }
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 20px; border-radius: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .stat-box:hover { transform: translateY(-5px); }
        .stat-number { font-size: 36px; font-weight: bold; background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-label { color: #718096; font-size: 13px; margin-top: 8px; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .table th { background: #f7fafc; font-weight: 600; color: #2d3748; }
        .table tr:hover td { background: #faf5ff; }
        .alert { padding: 15px 20px; border-radius: 20px; margin-bottom: 20px; animation: slideIn 0.5s ease; position: fixed; top: 80px; left: 20px; right: 20px; z-index: 1000; max-width: 400px; margin: 0 auto; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .alert-error { background: #f8d7da; color: #721c24; border-right: 4px solid #e74c3c; }
        .alert-success { background: #d4edda; color: #155724; border-right: 4px solid #27ae60; }
        .filter-bar { background: white; padding: 20px; border-radius: 25px; margin-bottom: 25px; }
        .filter-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: flex-end; }
        .bulk-actions { background: white; padding: 15px 20px; border-radius: 25px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .student-card { background: white; border-radius: 25px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .student-card-header { background: linear-gradient(135deg, #2c3e50, #1a2a3a); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; cursor: pointer; }
        .student-card-header:hover { background: linear-gradient(135deg, #ff8c00, #ffd700); }
        .student-info { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; }
        .student-name { font-size: 18px; font-weight: bold; }
        .student-detail { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .badge-hidden-count { background: #e74c3c; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .student-card-body { display: none; padding: 20px; }
        .student-card.expanded .student-card-body { display: block; }
        .expand-icon { font-size: 20px; transition: transform 0.3s; }
        .student-card.expanded .expand-icon { transform: rotate(180deg); }
        .courses-table { width: 100%; border-collapse: collapse; }
        .courses-table th, .courses-table td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .courses-table th { background: #f7fafc; font-weight: 600; }
        .checkbox-col { width: 40px; text-align: center; }
        .checkbox-col input { width: 18px; height: 18px; cursor: pointer; }
        .badge-visible { background: #27ae60; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge-hidden { background: #e74c3c; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge-empty { background: #f59e0b; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .toggle-link { background: #e0e7ff; border: none; padding: 4px 12px; border-radius: 10px; cursor: pointer; margin: 0 3px; }
        .toggle-link:hover { background: #c7d2fe; }
        .export-buttons { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; flex-wrap: wrap; }
        .batch-update-card { background: linear-gradient(135deg, #fef3c7, #fde68a); border-right: 4px solid #f59e0b; }
        .json-instructions { background: #e8f4fd; border-right: 4px solid #3498db; padding: 15px; border-radius: 15px; margin-top: 15px; font-size: 13px; }
        .save-indicator { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 8px 16px; border-radius: 30px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
        .save-indicator.show { opacity: 1; }
        .no-data-message { text-align: center; padding: 50px; color: #718096; }
        
        /* شاشة تسجيل الدخول */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.5s ease;
        }
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        .login-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .login-sub {
            color: #718096;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .login-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 5px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            margin-bottom: 20px;
            direction: ltr;
        }
        .login-input:focus {
            outline: none;
            border-color: #ff8c00;
            box-shadow: 0 0 0 3px rgba(255,140,0,0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #2c3e50, #1a2a3a);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #ff8c00, #ffd700);
            color: #2c3e50;
        }
        .login-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        .change-pass-btn {
            background: none;
            border: none;
            color: #ff8c00;
            cursor: pointer;
            font-size: 12px;
            margin-top: 15px;
            text-decoration: underline;
        }
        .change-pass-btn:hover {
            color: #e67e22;
        }
        
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .stats-bar { grid-template-columns: 1fr; }
            .filter-form { grid-template-columns: 1fr; }
            .export-buttons { justify-content: stretch; }
            .export-buttons .btn { flex: 1; text-align: center; }
            .nav-links { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="saveIndicator" class="save-indicator">💾 تم الحفظ</div>

    <script>
        // نظام الحماية
        const Auth = {
            defaultPassword: '1234',
            storageKey: 'neovision_admin_auth',
            
            checkAuth() {
                const authData = localStorage.getItem(this.storageKey);
                if (authData) {
                    try {
                        const { expires, passwordHash } = JSON.parse(authData);
                        if (Date.now() < expires && passwordHash === this.hashPassword(this.getCurrentPassword())) {
                            return true;
                        }
                    } catch(e) {}
                }
                return false;
            },
            
            createSession() {
                const session = {
                    expires: Date.now() + (30 * 60 * 1000),
                    passwordHash: this.hashPassword(this.getCurrentPassword())
                };
                localStorage.setItem(this.storageKey, JSON.stringify(session));
            },
            
            logout() {
                localStorage.removeItem(this.storageKey);
                window.location.reload();
            },
            
            getCurrentPassword() {
                const saved = localStorage.getItem('neovision_admin_password');
                return saved || this.defaultPassword;
            },
            
            changePassword(oldPassword, newPassword) {
                const current = this.getCurrentPassword();
                if (this.hashPassword(oldPassword) !== this.hashPassword(current)) {
                    return { success: false, message: 'كلمة المرور الحالية غير صحيحة' };
                }
                if (!newPassword || newPassword.length < 4) {
                    return { success: false, message: 'كلمة المرور الجديدة يجب أن تكون 4 أرقام أو أكثر' };
                }
                localStorage.setItem('neovision_admin_password', newPassword);
                this.createSession();
                return { success: true, message: 'تم تغيير كلمة المرور بنجاح' };
            },
            
            verifyPassword(password) {
                const current = this.getCurrentPassword();
                return this.hashPassword(password) === this.hashPassword(current);
            },
            
            hashPassword(password) {
                let hash = 0;
                for (let i = 0; i < password.length; i++) {
                    const char = password.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return hash.toString();
            },
            
            showLoginScreen(onSuccess) {
                const existingOverlay = document.querySelector('.login-overlay');
                if (existingOverlay) existingOverlay.remove();
                
                const overlay = document.createElement('div');
                overlay.className = 'login-overlay';
                overlay.innerHTML = `
                    <div class="login-card">
                        <div class="login-logo">🔐</div>
                        <div class="login-title">لوحة الإدارة</div>
                        <div class="login-sub">مدارس نيو فيجن الخاصة</div>
                        <input type="password" id="loginPassword" class="login-input" placeholder="••••" maxlength="10" autocomplete="off">
                        <button id="loginBtn" class="login-btn">دخول</button>
                        <button id="changePasswordBtn" class="change-pass-btn">🔑 تغيير كلمة المرور</button>
                        <div id="loginError" class="login-error"></div>
                    </div>
                `;
                document.body.appendChild(overlay);
                
                const passwordInput = document.getElementById('loginPassword');
                const loginBtn = document.getElementById('loginBtn');
                const changeBtn = document.getElementById('changePasswordBtn');
                const errorDiv = document.getElementById('loginError');
                
                const attemptLogin = () => {
                    const password = passwordInput.value;
                    if (this.verifyPassword(password)) {
                        this.createSession();
                        overlay.remove();
                        if (onSuccess) onSuccess();
                    } else {
                        errorDiv.textContent = '⚠️ كلمة المرور غير صحيحة';
                        errorDiv.style.display = 'block';
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                };
                
                loginBtn.onclick = attemptLogin;
                passwordInput.onkeypress = (e) => { if (e.key === 'Enter') attemptLogin(); };
                
                changeBtn.onclick = () => {
                    const oldPass = prompt('🔐 أدخل كلمة المرور الحالية:');
                    if (!oldPass) return;
                    if (!this.verifyPassword(oldPass)) {
                        alert('⚠️ كلمة المرور الحالية غير صحيحة');
                        return;
                    }
                    const newPass = prompt('🔐 أدخل كلمة المرور الجديدة (4 أرقام أو أكثر):');
                    if (!newPass || newPass.length < 4) {
                        alert('⚠️ كلمة المرور الجديدة يجب أن تكون 4 أرقام أو أكثر');
                        return;
                    }
                    const confirmPass = prompt('🔐 أعد إدخال كلمة المرور الجديدة:');
                    if (newPass !== confirmPass) {
                        alert('⚠️ كلمة المرور غير متطابقة');
                        return;
                    }
                    localStorage.setItem('neovision_admin_password', newPass);
                    this.createSession();
                    alert('✅ تم تغيير كلمة المرور بنجاح');
                };
                
                passwordInput.focus();
            }
        };
        
        const App = {
            activeTab: 'dashboard',
            students: [],
            results: [],
            uploadLogs: [],
            isAuthenticated: false,
            saveTimeout: null,
            gradeLevels: [
                { id: 1, name: 'KG1' }, { id: 2, name: 'KG2' },
                { id: 3, name: 'الصف الأول الابتدائي' }, { id: 4, name: 'الصف الثاني الابتدائي' },
                { id: 5, name: 'الصف الثالث الابتدائي' }, { id: 6, name: 'الصف الرابع الابتدائي' },
                { id: 7, name: 'الصف الخامس الابتدائي' }, { id: 8, name: 'الصف السادس الابتدائي' },
                { id: 9, name: 'الصف الأول الإعدادي' }, { id: 10, name: 'الصف الثاني الإعدادي' },
                { id: 11, name: 'الصف الثالث الإعدادي' }, { id: 12, name: 'الصف الأول الثانوي' },
                { id: 13, name: 'الصف الثاني الثانوي' }, { id: 14, name: 'الصف الثالث الثانوي' }
            ],
            
            // جعل الفلاتر الافتراضية فارغة (الكل) بدلاً من قيم محددة
            filters: { grade: '', semester: '', year: '', hideFilter: 'all', search: '' },
            batchFilters: { grade: '', semester: 'first', year: '2026' },
            
            init() {
                if (Auth.checkAuth()) {
                    this.isAuthenticated = true;
                    this.loadData();
                    this.render();
                    window.addEventListener('beforeunload', () => { this.saveData(); });
                } else {
                    Auth.showLoginScreen(() => {
                        this.isAuthenticated = true;
                        this.loadData();
                        this.render();
                    });
                }
            },
            
            logout() {
                Auth.logout();
            },
            
            loadData() {
                try {
                    const savedStudents = localStorage.getItem('neovision_students');
                    const savedResults = localStorage.getItem('neovision_results');
                    const savedUploads = localStorage.getItem('neovision_uploads');
                    
                    this.students = savedStudents ? JSON.parse(savedStudents) : [];
                    this.results = savedResults ? JSON.parse(savedResults) : [];
                    this.uploadLogs = savedUploads ? JSON.parse(savedUploads) : [];
                    
                    console.log('📊 تم تحميل:', this.students.length, 'طالب،', this.results.length, 'نتيجة');
                    
                    // محاولة استخراج السنوات والمراحل المتاحة للفلاتر
                    this.detectAvailableFilters();
                } catch(e) { 
                    console.error(e);
                    this.students = [];
                    this.results = [];
                    this.uploadLogs = [];
                }
            },
            
            detectAvailableFilters() {
                // تحديد السنوات المتاحة في البيانات
                const years = new Set();
                const semesters = new Set();
                this.results.forEach(r => {
                    if (r.academic_year) years.add(r.academic_year);
                    if (r.semester) semesters.add(r.semester);
                });
                
                // إذا كان الفلتر الحالي غير موجود في البيانات، قم بإزالته
                if (this.filters.year && !years.has(this.filters.year)) {
                    this.filters.year = '';
                }
                if (this.filters.semester && !semesters.has(this.filters.semester)) {
                    this.filters.semester = '';
                }
                
                console.log('📅 السنوات المتاحة:', Array.from(years));
                console.log('📖 الفصول المتاحة:', Array.from(semesters));
            },
            
            showSaveIndicator() {
                const indicator = document.getElementById('saveIndicator');
                if (indicator) {
                    indicator.classList.add('show');
                    if (this.saveTimeout) clearTimeout(this.saveTimeout);
                    this.saveTimeout = setTimeout(() => {
                        indicator.classList.remove('show');
                    }, 1500);
                }
            },
            
            saveData() {
                localStorage.setItem('neovision_students', JSON.stringify(this.students));
                localStorage.setItem('neovision_results', JSON.stringify(this.results));
                localStorage.setItem('neovision_uploads', JSON.stringify(this.uploadLogs));
                this.showSaveIndicator();
            },
            
            exportToJson() {
                const data = {
                    students: this.students,
                    results: this.results,
                    lastUpdated: new Date().toISOString(),
                    totalStudents: this.students.length,
                    totalResults: this.results.length,
                    version: '1.0'
                };
                
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'data.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.showMessage(`✅ تم تحميل ملف data.json بنجاح!<br>📊 يحتوي على ${this.students.length} طالب و ${this.results.length} نتيجة.<br>📌 قم برفع هذا الملف إلى مجلد موقعك على GitHub Pages`, 'success');
            },
            
            getUniqueSubjectsForGrade(gradeId, semester, year) {
                const gradeResults = this.results.filter(r => 
                    r.grade_level_id == gradeId && 
                    (semester ? r.semester === semester : true) && 
                    (year ? r.academic_year === year : true)
                );
                const subjectsMap = new Map();
                gradeResults.forEach(r => {
                    if (!subjectsMap.has(r.subject_name)) {
                        subjectsMap.set(r.subject_name, {
                            name: r.subject_name,
                            currentStatus: r.is_added_to_total,
                            sampleId: r.id
                        });
                    }
                });
                return Array.from(subjectsMap.values()).sort((a, b) => a.name.localeCompare(b.name));
            },
            
            updateSubjectsAddedStatus(gradeId, semester, year, subjectStatusMap) {
                let updatedCount = 0;
                this.results = this.results.map(r => {
                    if (r.grade_level_id == gradeId && r.semester === semester && r.academic_year === year) {
                        const newStatus = subjectStatusMap.get(r.subject_name);
                        if (newStatus !== undefined && r.is_added_to_total !== newStatus) {
                            updatedCount++;
                            return { ...r, is_added_to_total: newStatus };
                        }
                    }
                    return r;
                });
                if (updatedCount > 0) {
                    this.saveData();
                    this.showMessage(`✅ تم تحديث ${updatedCount} مادة بنجاح`, 'success');
                    this.render();
                } else {
                    this.showMessage(`ℹ️ لم يتم العثور على تغييرات`, 'success');
                }
            },
            
            exportSubjectsToExcel(gradeId, semester, year) {
                const subjects = this.getUniqueSubjectsForGrade(gradeId, semester, year);
                if (subjects.length === 0) {
                    this.showMessage('لا توجد مواد في هذه المرحلة', 'error');
                    return;
                }
                
                const exportData = subjects.map(sub => ({
                    'اسم المادة': sub.name,
                    'مضافة للمجموع حالياً': sub.currentStatus ? 'نعم' : 'لا'
                }));
                
                const gradeName = this.gradeLevels.find(g => g.id == gradeId)?.name || gradeId;
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, `مواد_${gradeName}`);
                XLSX.writeFile(wb, `مواد_المرحلة_${gradeName}_${semester}_${year}.xlsx`);
                this.showMessage(`✅ تم تصدير ${subjects.length} مادة بنجاح`, 'success');
            },
            
            uploadSubjectsFile(file, gradeId, semester, year) {
                if (!file) { this.showMessage('الرجاء اختيار ملف', 'error'); return; }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        
                        if (!rows || rows.length < 2) {
                            this.showMessage('الملف فارغ أو لا يحتوي على بيانات', 'error');
                            return;
                        }
                        
                        const headers = rows[0];
                        let nameColIndex = -1;
                        let addedColIndex = -1;
                        
                        for (let j = 0; j < headers.length; j++) {
                            const colName = headers[j]?.toString().trim() || '';
                            if (colName.includes('اسم المادة') || colName.includes('المادة') || colName.toLowerCase().includes('subject')) {
                                nameColIndex = j;
                            }
                            if (colName.includes('مضافة') || colName.includes('مضاف') || colName.toLowerCase().includes('added')) {
                                addedColIndex = j;
                            }
                        }
                        
                        if (nameColIndex === -1) {
                            this.showMessage('⚠️ يجب أن يحتوي الملف على عمود "اسم المادة"', 'error');
                            return;
                        }
                        
                        const subjectStatusMap = new Map();
                        let validRows = 0;
                        
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row) continue;
                            
                            let subjectName = row[nameColIndex]?.toString().trim();
                            if (!subjectName) continue;
                            
                            let isAdded = false;
                            if (addedColIndex !== -1) {
                                const addedValue = row[addedColIndex]?.toString().trim().toLowerCase();
                                isAdded = (addedValue === 'نعم' || addedValue === 'yes' || addedValue === 'true' || addedValue === '1');
                            }
                            
                            subjectStatusMap.set(subjectName, isAdded);
                            validRows++;
                        }
                        
                        if (validRows === 0) {
                            this.showMessage('لم يتم العثور على بيانات صالحة في الملف', 'error');
                            return;
                        }
                        
                        this.updateSubjectsAddedStatus(gradeId, semester, year, subjectStatusMap);
                    } catch(err) {
                        console.error(err);
                        this.showMessage('خطأ: ' + err.message, 'error');
                    }
                };
                reader.onerror = () => this.showMessage('خطأ في قراءة الملف', 'error');
                reader.readAsArrayBuffer(file);
            },
            
            uploadExcelFile(file, gradeLevelId, semester, year) {
                if (!file) { this.showMessage('الرجاء اختيار ملف', 'error'); return; }
                this.showMessage('جاري معالجة الملف...', 'success');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        
                        if (!rows || rows.length < 2) { 
                            this.showMessage('الملف فارغ أو لا يحتوي على بيانات', 'error'); 
                            return; 
                        }
                        
                        const headers = rows[0];
                        if (headers.length < 2) {
                            this.showMessage('يجب أن يحتوي الملف على عمودين على الأقل', 'error');
                            return;
                        }
                        
                        let nationalColIndex = -1;
                        let nameColIndex = -1;
                        let seatColIndex = -1;
                        
                        for (let j = 0; j < headers.length; j++) {
                            const colName = headers[j]?.toString().trim() || '';
                            if (colName.includes('الرقم القومي') || colName.includes('رقم قومي') || colName.toLowerCase().includes('national')) {
                                nationalColIndex = j;
                            }
                            if (colName.includes('اسم الطالب') || colName.includes('اسم') || colName.toLowerCase().includes('student')) {
                                nameColIndex = j;
                            }
                            if (colName.includes('جلوس') || colName.includes('seat') || colName.toLowerCase().includes('seat')) {
                                seatColIndex = j;
                            }
                        }
                        
                        if (nationalColIndex === -1 || nameColIndex === -1) {
                            this.showMessage('⚠️ يجب أن يحتوي الملف على عمود "الرقم القومي" و عمود "اسم الطالب"', 'error');
                            return;
                        }
                        
                        const subjectColumns = [];
                        for (let j = 0; j < headers.length; j++) {
                            if (j === nationalColIndex || j === nameColIndex || j === seatColIndex) continue;
                            const subjectName = headers[j]?.toString().trim();
                            if (subjectName) {
                                subjectColumns.push({ index: j, name: subjectName });
                            }
                        }
                        
                        const addedKeywords = ['اللغة العربية', 'اللغة الانجليزية', 'الرياضيات', 'العلوم', 'التاريخ', 'الفلسفة', 'المنطق', 'الفيزياء', 'الكيمياء', 'الدراسات', 'المجموع الكلي', 'تحريري'];
                        const notAddedKeywords = ['غير مضاف', 'التربية الدينية', 'اللغة الأجنبية الثانية', 'البرمجة', 'الذكاء الاصطناعي', 'مستوي E', 'الحالة', 'التربية الفنية', 'التربية الوطنية', 'التربية المهنية', 'ICT', 'عملي'];
                        
                        const isAddedMap = new Array(subjectColumns.length).fill(false);
                        
                        for (let i = 0; i < subjectColumns.length; i++) {
                            const colName = subjectColumns[i].name;
                            let isNotAdded = false;
                            for (let kw of notAddedKeywords) {
                                if (colName.includes(kw)) {
                                    isNotAdded = true;
                                    break;
                                }
                            }
                            if (isNotAdded) {
                                isAddedMap[i] = false;
                                continue;
                            }
                            
                            for (let kw of addedKeywords) {
                                if (colName.includes(kw)) {
                                    isAddedMap[i] = true;
                                    break;
                                }
                            }
                        }
                        
                        let hasAdded = isAddedMap.some(v => v === true);
                        if (!hasAdded && subjectColumns.length >= 7) {
                            for (let i = 0; i < 7; i++) {
                                isAddedMap[i] = true;
                            }
                        }
                        
                        let newResults = [];
                        let counter = 0;
                        let studentsCount = 0;
                        
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row) continue;
                            
                            let nationalId = row[nationalColIndex]?.toString().trim();
                            let studentName = row[nameColIndex]?.toString().trim();
                            let seatNumber = (seatColIndex !== -1 && row[seatColIndex]) ? row[seatColIndex]?.toString().trim() : '';
                            
                            if (!nationalId || !studentName) continue;
                            if (nationalId.length !== 14 || isNaN(nationalId)) continue;
                            
                            studentsCount++;
                            
                            let student = this.students.find(s => s.nationalId === nationalId);
                            if (!student) {
                                student = {
                                    id: Date.now() + counter++,
                                    nationalId: nationalId,
                                    name: studentName,
                                    seatNumber: seatNumber || '',
                                    grade_level_id: gradeLevelId,
                                    academic_year: year,
                                    created_at: new Date().toISOString()
                                };
                                this.students.push(student);
                            } else if (seatNumber && !student.seatNumber) {
                                student.seatNumber = seatNumber;
                            }
                            
                            let orderIndex = 0;
                            for (let colIdx = 0; colIdx < subjectColumns.length; colIdx++) {
                                const col = subjectColumns[colIdx];
                                const subjectName = col.name;
                                let subjectGrade = row[col.index]?.toString().trim();
                                if (!subjectGrade || subjectGrade === "") {
                                    subjectGrade = "—";
                                }
                                
                                newResults.push({
                                    id: Date.now() + counter++,
                                    student_id: student.id,
                                    grade_level_id: gradeLevelId,
                                    semester: semester,
                                    academic_year: year,
                                    subject_name: subjectName,
                                    subject_grade: subjectGrade,
                                    is_hidden: false,
                                    is_empty: (subjectGrade === "—"),
                                    is_added_to_total: isAddedMap[colIdx],
                                    display_order: orderIndex++,
                                    upload_date: new Date().toISOString(),
                                    upload_filename: file.name
                                });
                            }
                        }
                        
                        if (studentsCount === 0) { 
                            this.showMessage('لم يتم العثور على بيانات صالحة (أرقام قومية صحيحة)', 'error'); 
                            return; 
                        }
                        
                        if (newResults.length === 0) { 
                            this.showMessage('لم يتم العثور على مواد دراسية', 'error'); 
                            return; 
                        }
                        
                        this.results.push(...newResults);
                        this.uploadLogs.unshift({
                            id: Date.now(),
                            filename: file.name,
                            grade_level_id: gradeLevelId,
                            academic_year: year,
                            semester: semester,
                            records_count: newResults.length,
                            students_count: studentsCount,
                            upload_date: new Date().toISOString()
                        });
                        
                        this.saveData();
                        this.showMessage(`✅ تم رفع ${newResults.length} مادة دراسية لعدد ${studentsCount} طالب`, 'success');
                        this.filters = { grade: gradeLevelId.toString(), semester: semester, year: year, hideFilter: 'all', search: '' };
                        this.render();
                    } catch(err) { 
                        console.error(err);
                        this.showMessage('خطأ: ' + err.message, 'error'); 
                    }
                };
                reader.onerror = () => this.showMessage('خطأ في قراءة الملف', 'error');
                reader.readAsArrayBuffer(file);
            },
            
            deleteUpload(uploadId) {
                const upload = this.uploadLogs.find(u => u.id == uploadId);
                if (!upload) return;
                if (confirm(`🗑️ هل أنت متأكد من حذف ملف "${upload.filename}"؟ سيؤدي ذلك إلى حذف جميع البيانات المرتبطة بهذا الرفع.`)) {
                    const uploadDate = new Date(upload.upload_date);
                    const timeWindow = 5000;
                    this.results = this.results.filter(r => Math.abs(new Date(r.upload_date) - uploadDate) > timeWindow);
                    this.uploadLogs = this.uploadLogs.filter(u => u.id != uploadId);
                    this.saveData();
                    this.showMessage(`✅ تم حذف الملف وبياناته بنجاح`, 'success');
                    this.render();
                }
            },
            
            toggleResult(resultId) {
                const result = this.results.find(r => r.id == resultId);
                if (result) {
                    result.is_hidden = !result.is_hidden;
                    this.saveData();
                    this.showMessage(`تم ${result.is_hidden ? 'إخفاء' : 'إظهار'} النتيجة`, 'success');
                    this.render();
                }
            },
            
            deleteResult(resultId) {
                if (confirm('هل أنت متأكد من حذف هذه النتيجة؟')) {
                    this.results = this.results.filter(r => r.id != resultId);
                    this.saveData();
                    this.showMessage('تم حذف النتيجة', 'success');
                    this.render();
                }
            },
            
            bulkToggle(resultIds, hide) {
                this.results.forEach(r => { if (resultIds.includes(r.id)) r.is_hidden = hide; });
                this.saveData();
                this.showMessage(`تم ${hide ? 'إخفاء' : 'إظهار'} ${resultIds.length} نتيجة`, 'success');
                this.render();
            },
            
            bulkActions(action) {
                const checkboxes = document.querySelectorAll('.result-checkbox:checked');
                const ids = Array.from(checkboxes).map(cb => parseInt(cb.dataset.resultId));
                if (ids.length === 0) { this.showMessage('الرجاء تحديد النتائج المراد تعديلها', 'error'); return; }
                if (confirm(`هل أنت متأكد من ${action === 'show' ? 'إظهار' : 'إخفاء'} ${ids.length} نتيجة؟`)) {
                    this.bulkToggle(ids, action === 'hide');
                }
            },
            
            showMessage(message, type) {
                const oldMsg = document.querySelector('.alert');
                if (oldMsg) oldMsg.remove();
                const div = document.createElement('div');
                div.className = `alert alert-${type}`;
                div.style.whiteSpace = 'pre-line';
                div.innerHTML = message;
                const container = document.querySelector('.container');
                if (container) container.insertBefore(div, container.firstChild);
                setTimeout(() => div.remove(), 4000);
            },
            
            getStats() {
                return {
                    totalStudents: this.students.length,
                    totalResults: this.results.length,
                    hiddenResults: this.results.filter(r => r.is_hidden).length,
                    totalUploads: this.uploadLogs.length
                };
            },
            
            getFilteredResults() {
                let filtered = [...this.results];
                
                // تطبيق الفلاتر فقط إذا كانت القيم محددة (غير فارغة)
                if (this.filters.grade && this.filters.grade !== '') {
                    filtered = filtered.filter(r => r.grade_level_id == this.filters.grade);
                }
                if (this.filters.semester && this.filters.semester !== '') {
                    filtered = filtered.filter(r => r.semester === this.filters.semester);
                }
                if (this.filters.year && this.filters.year !== '') {
                    filtered = filtered.filter(r => r.academic_year === this.filters.year);
                }
                if (this.filters.hideFilter === 'visible') {
                    filtered = filtered.filter(r => !r.is_hidden);
                } else if (this.filters.hideFilter === 'hidden') {
                    filtered = filtered.filter(r => r.is_hidden);
                }
                
                return filtered;
            },
            
            getStudentsWithResults() {
                let filteredResults = this.getFilteredResults();
                
                // تطبيق البحث على الطلاب
                if (this.filters.search && this.filters.search !== '') {
                    const studentIds = this.students.filter(s => s.name.includes(this.filters.search)).map(s => s.id);
                    filteredResults = filteredResults.filter(r => studentIds.includes(r.student_id));
                }
                
                // تجميع النتائج حسب الطالب
                const map = new Map();
                filteredResults.forEach(r => {
                    const student = this.students.find(s => s.id === r.student_id);
                    if (student) {
                        if (!map.has(student.id)) {
                            map.set(student.id, { 
                                ...student, 
                                results: [],
                                grade_level_id: student.grade_level_id,
                                academic_year: student.academic_year
                            });
                        }
                        map.get(student.id).results.push(r);
                    }
                });
                
                // ترتيب النتائج لكل طالب حسب display_order
                for (let student of map.values()) {
                    student.results.sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
                }
                
                // ترتيب الطلاب حسب الاسم
                return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name));
            },

            exportToExcel() {
                const studentsData = this.getStudentsWithResults();
                if (studentsData.length === 0) {
                    this.showMessage('لا توجد بيانات لتصديرها', 'error');

                if (logoutHeaderBtn) {
                    logoutHeaderBtn.onclick = () => this.logout();
                }

                if (studentLink) {
                    studentLink.onclick = (e) => {
                        this.saveData();
                        return true;

                if (exportJsonBtn) {
                    exportJsonBtn.onclick = () => this.exportToJson();
                }
                
                const uploadForm = document.getElementById('uploadForm');
                if (uploadForm) {
                    uploadForm.addEventListener('submit', (e) => {

                        const semester = document.getElementById('semester').value;
                        const year = document.getElementById('academicYear').value;

                        if (!file) { this.showMessage('اختر ملف', 'error'); return; }
                        this.uploadExcelFile(file, gradeLevelId, semester, year);
                    });
                }
                
                const exportSubjectsBtn = document.getElementById('exportSubjectsBtn');

                        const year = document.getElementById('batchYear').value;
                        if (!gradeId) { this.showMessage('اختر المرحلة أولاً', 'error'); return; }
                        this.exportSubjectsToExcel(parseInt(gradeId), semester, year);
                    };
                }
                
                const uploadSubjectsInput = document.getElementById('uploadSubjectsFile');

                        const file = e.target.files[0];
                        const gradeId = document.getElementById('batchGradeLevel').value;
                        const semester = document.getElementById('batchSemester').value;
                        const year = document.getElementById('batchYear').value;
                        if (!gradeId) { this.showMessage('اختر المرحلة أولاً', 'error'); return; }

                const filterForm = document.getElementById('filterForm');

                        this.updateFilters({
                            grade: fd.get('grade') || '',
                            semester: fd.get('semester') || '',
                            year: fd.get('year') || '',
                            hideFilter: fd.get('hideFilter') || 'all',
                            search: fd.get('search') || ''
                        });
                    };

                    resetBtn.onclick = () => {

                }
                
                const bulkShowBtn = document.getElementById('bulkShowBtn');
                const bulkHideBtn = document.getElementById('bulkHideBtn');
                if (bulkShowBtn) bulkShowBtn.onclick = () => this.bulkActions('show');
                if (bulkHideBtn) bulkHideBtn.onclick = () => this.bulkActions('hide');
                
                const exportExcelBtn = document.getElementById('exportExcelBtn');
                if (exportExcelBtn) exportExcelBtn.onclick = () => this.exportToExcel();
                
                const printAllBtn = document.getElementById('printAllBtn');
                if (printAllBtn) printAllBtn.onclick = () => this.printAllResults();
                
                const selectAll = document.getElementById('selectAll');
                if (selectAll) {
                    selectAll.onchange = (e) => {
                        document.querySelectorAll('.result-checkbox').forEach(cb => cb.checked = e.target.checked);
                    };
                }
            },
            
            updateFilters(newFilters) { 
                this.filters = { ...this.filters, ...newFilters }; 
                console.log('تم تحديث الفلاتر:', this.filters);
                this.render(); 
            },
            escapeHtml(text) { if (!text) return ''; return String(text).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        };
        
        window.App = App;
        App.init();
    </script>
</body>
</html>
